<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#22c55e">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .error {
            color: red;
            margin-bottom: 10px;
            text-align: center;
        }

        .success {
            color: green;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Reset Password</h2>

    <div th:if="${error}" class="error">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${message}" class="success">
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/reset-password}" method="post">

        <!-- Hidden Token -->
        <input type="hidden" name="token" th:value="${token}">

        <label>New Password</label>
        <input type="password"
               name="newPassword"
               placeholder="Enter New Password"
               required>

        <button type="submit">
            Update Password
        </button>

    </form>

</div>

</body>
</html>
