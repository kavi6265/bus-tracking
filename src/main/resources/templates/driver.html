<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Console - District-Aware Routing Deployment</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary: #22c55e;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px 0;
        }
        .driver-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        #map {
            width: 100%;
            height: 450px;
            min-height: 400px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        
        .coordinate-badge {
            font-size: 11px;
            color: var(--muted);
        }
        .tracking-active {
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .gm-style-iw {
            color: #000 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-12">
            
            <div class="driver-card" id="consoleCard">
                <h3 class="mb-4 text-center">
                    <i class="bi bi-map-fill text-success me-2"></i> Route Deployment Console
                </h3>
                
                <div class="row g-4">
                    <div class="col-md-5 col-12">
                        <form id="routeForm">
                            <div class="mb-3">
                                <label for="busNumber" class="form-label fw-semibold">Bus Number</label>
                                <input type="text" id="busNumber" class="form-control bg-dark text-white border-secondary" placeholder="e.g., 26" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="busName" class="form-label fw-semibold">Bus Name / Label</label>
                                <input type="text" id="busName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., 26G" required>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="sourceName" class="form-label fw-semibold text-success mb-0">Source Station</label>
                                    <button type="button" id="btnGetGPS" class="btn btn-outline-success btn-sm py-0 px-2" style="font-size: 0.8rem;">
                                        <i class="bi bi-geo-alt-fill"></i> Use GPS
                                    </button>
                                </div>
                                <input
                                type="text"
                                id="sourceName"
                                class="form-control bg-dark text-white border-secondary"
                                placeholder="Panamaruthapatti|Salem"
                                required>
                                <div class="coordinate-badge mt-1" id="lblSourceCoords">Coords: Not Loaded</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="midRouteStops" class="form-label fw-semibold text-warning">Via Pass-Through Stations (Comma Separated)</label>
                                <input
                                type="text"
                                id="midRouteStops"
                                class="form-control bg-dark text-white border-secondary"
                                placeholder="Odasalpatti|Dharmapuri, Harur|Dharmapuri">
                            </div>

                            <div class="mb-4">
                                <label for="destinationName" class="form-label fw-semibold text-info">Destination Station</label>
                                <input
                                type="text"
                                id="destinationName"
                                class="form-control bg-dark text-white border-secondary"
                                placeholder="Morappur|Dharmapuri"
                                required>
                                <div class="coordinate-badge mt-1" id="lblDestCoords">Coords: Not Loaded</div>
                            </div>

                            <div class="d-flex flex-column gap-2">
                                <button type="submit" id="btnSubmit" class="btn btn-success w-100 py-2 fw-bold">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking
                                </button>
                                
                                <button type="button" id="btnAddNewPlace" class="btn btn-outline-warning w-100 py-2 fw-semibold">
                                    <i class="bi bi-plus-circle-fill me-2"></i> Mark & Name Current Location
                                </button>
                            </div>
                        </form>
                        
                        <div id="trackingStatusCard" class="mt-4 p-3 bg-dark border border-success rounded-3 d-none">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <div class="text-success fw-bold"><i class="bi bi-broadcast text-danger"></i> Live Transmission Active</div>
                                    <div class="text-warning small mt-1" id="radarCurrentStop">Current: Calculating...</div>
                                    <small class="text-muted" id="lastTxTime">Waiting for first sync...</small>
                                </div>
                                <span class="badge bg-success" id="txCounter">0 Tx</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-7 col-12">
                        <label class="form-label fw-semibold text-secondary">Live Route Preview Anchors</label>
                        <div id="map"></div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCF9GcWnQz-IeVXBfzbpVWntKppkLm1YpA&libraries=places&callback=initMap" async defer></script>

<script>
    let map;
    let directionsService;
    let directionsRenderer;
    let geocoder;
    let fallbackPolyline = null;
    
    let sourceLat = null, sourceLng = null; 
    let destLat = null, destLng = null;     
    let liveWatchId = null;
    let totalTransmissions = 0;
    
    let routeCoordinatesGeoRegistry = [];
    let customMarkersArray = [];
    
    let sourceMarker = null;
    let destMarker = null;
    let driverLiveMarker = null;

    const darkMapStyle = [
        { "elementType": "geometry", "stylers": [{ "color": "#0f172a" }] },
        { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
        { "elementType": "labels.text.stroke", "stylers": [{ "color": "#0f172a" }] },
        { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
        { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#22c55e" }] },
        { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
        { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#334155" }] },
        { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#334155" }] },
        { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#020617" }] }
    ];

    function initMap() {
        geocoder = new google.maps.Geocoder();
        directionsService = new google.maps.DirectionsService();
        
        directionsRenderer = new google.maps.DirectionsRenderer({
            suppressMarkers: true
        });

        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 11.9000, lng: 78.3500 },
            zoom: 9,
            styles: darkMapStyle,
            disableDefaultUI: false
        });

        directionsRenderer.setMap(map);
    }

    function clearPreviousRoute() {
        if (fallbackPolyline) fallbackPolyline.setMap(null);
        if (sourceMarker) sourceMarker.setMap(null);
        if (destMarker) destMarker.setMap(null);
        customMarkersArray.forEach(m => m.setMap(null));
        customMarkersArray = [];
    }

    function updateMapBounds() {
        const bounds = new google.maps.LatLngBounds();
        let markerCount = 0;

        if (sourceMarker) { bounds.extend(sourceMarker.getPosition()); markerCount++; }
        if (destMarker) { bounds.extend(destMarker.getPosition()); markerCount++; }
        if (driverLiveMarker) { bounds.extend(driverLiveMarker.getPosition()); markerCount++; }
        customMarkersArray.forEach(m => { bounds.extend(m.getPosition()); markerCount++; });
        
        if (markerCount > 1) {
            map.fitBounds(bounds);
        } else if (markerCount === 1) {
            map.setCenter(bounds.getCenter());
            map.setZoom(12);
        }
    }

    function drawRouteLine() {
        if (routeCoordinatesGeoRegistry.length < 2) return;

        if (fallbackPolyline) {
            fallbackPolyline.setMap(null);
        }

        let routeLineColor = '#22c55e'; 
        let routeWeight = 6;
        
        if (routeCoordinatesGeoRegistry.length > 2) {
            routeLineColor = '#ec4899'; 
            routeWeight = 8;            
        }

        directionsRenderer.setOptions({
            polylineOptions: {
                strokeColor: routeLineColor,
                strokeWeight: routeWeight,
                strokeOpacity: 0.95
            }
        });

        const originPoint = routeCoordinatesGeoRegistry[0];
        const destinationPoint = routeCoordinatesGeoRegistry[routeCoordinatesGeoRegistry.length - 1];
        
        const waypoints = [];
        for (let i = 1; i < routeCoordinatesGeoRegistry.length - 1; i++) {
            waypoints.push({
                location: new google.maps.LatLng(routeCoordinatesGeoRegistry[i].lat, routeCoordinatesGeoRegistry[i].lng),
                stopover: true
            });
        }

        directionsService.route({
            origin: new google.maps.LatLng(originPoint.lat, originPoint.lng),
            destination: new google.maps.LatLng(destinationPoint.lat, destinationPoint.lng),
            waypoints: waypoints,
            travelMode: google.maps.TravelMode.DRIVING
        }, function(response, status) {
            if (status === google.maps.DirectionsStatus.OK) {
                directionsRenderer.setDirections(response);
            } else {
                const straightLinePathCoords = routeCoordinatesGeoRegistry.map(pt => {
                    return { lat: pt.lat, lng: pt.lng };
                });

                fallbackPolyline = new google.maps.Polyline({
                    path: straightLinePathCoords,
                    geodesic: true,
                    strokeColor: routeLineColor === '#22c55e' ? '#eab308' : routeLineColor,
                    strokeOpacity: 0.8,
                    strokeWeight: routeWeight - 1
                });
                fallbackPolyline.setMap(map);
            }
        });
    }

    async function resolveLocationInput(inputText, defaultLabel) {
        let cleanText = inputText.trim();
        
        let coordsPattern = /^([-+]?\d+\.\d+),\s*([-+]?\d+\.\d+)$/;
        let match = cleanText.match(coordsPattern);
        
        if (match) {
            return {
                name: defaultLabel,
                lat: parseFloat(match[1]),
                lng: parseFloat(match[2])
            };
        }
        
        return await geocodePromise(cleanText);
    }

    function geocodePromise(addressText) {
        return new Promise((resolve) => {
            if (typeof google === 'undefined' || !google.maps) {
                console.error("Google Maps API script resources are missing or not finished loading.");
                resolve(null);
                return;
            }

            let queryWithRegion = addressText.trim();
            if (addressText.includes("|")) {
                const parts = addressText.split("|");
                const place = parts[0].trim();
                const district = parts[1].trim();
                queryWithRegion = `${place}, ${district}, Tamil Nadu, India`;
            } else {
                queryWithRegion = `${addressText.trim()}, Tamil Nadu, India`;
            }

            console.log("Searching with Google Geocoder Service:", queryWithRegion);

            if (!geocoder) {
                geocoder = new google.maps.Geocoder();
            }

            geocoder.geocode({ address: queryWithRegion }, function (results, status) {
                if (status === google.maps.GeocoderStatus.OK && results.length > 0) {
                    resolve({
                        name: addressText.trim(),
                        lat: results[0].geometry.location.lat(),
                        lng: results[0].geometry.location.lng()
                    });
                } else {
                    console.error(`Google Geocoding completely failed for query: "${queryWithRegion}". Status Code: ${status}`);
                    if (status === "REQUEST_DENIED") {
                        console.error("ATTENTION: Verify that 'Geocoding API' is actively turned ON under API Restrictions in your Google Cloud Dashboard!");
                    }
                    resolve(null);
                }
            });
        });
    }

    document.getElementById('btnGetGPS').addEventListener('click', function() {
        const btn = this;
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser.");
            return;
        }
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Syncing...`;

        navigator.geolocation.getCurrentPosition(
            function(position) {
                sourceLat = position.coords.latitude;
                sourceLng = position.coords.longitude;
                document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                document.getElementById('sourceName').value = `${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
            },
            function() {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                alert("Could not access GPS metrics safely.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });

    document.getElementById('btnAddNewPlace').addEventListener('click', function() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function(position) {
            const currentLat = position.coords.latitude;
            const currentLng = position.coords.longitude;
            const label = prompt("Enter a label/name or confirm coords for position:", `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`);
            if (label) {
                const midStopsInput = document.getElementById('midRouteStops');
                midStopsInput.value = midStopsInput.value.trim() === "" ? label : `${midStopsInput.value}, ${label}`;
            }
        });
    });

    function initiateLiveTrackingPipeline(busNumber, busName, stopsString) {
        if (!navigator.geolocation) return;

        document.getElementById('consoleCard').classList.add('tracking-active');
        document.getElementById('trackingStatusCard').classList.remove('d-none');

        if(liveWatchId) navigator.geolocation.clearWatch(liveWatchId);

        liveWatchId = navigator.geolocation.watchPosition(
            function(position) {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;
                const currentSpeed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0; 

                if (driverLiveMarker) driverLiveMarker.setMap(null);
                
                driverLiveMarker = new google.maps.Marker({
                    position: { lat: currentLat, lng: currentLng },
                    map: map,
                    icon: { url: "https://cdn-icons-png.flaticon.com/512/3448/3448339.png", scaledSize: new google.maps.Size(38, 38) }
                });

                let matchedCurrentStop = routeCoordinatesGeoRegistry[0] ? routeCoordinatesGeoRegistry[0].name : "Route Transit";
                let shortestDistanceCalculated = Infinity;

                routeCoordinatesGeoRegistry.forEach(checkpoint => {
                    const diffLat = currentLat - checkpoint.lat;
                    const diffLng = currentLng - checkpoint.lng;
                    const approximateDistanceSquared = (diffLat * diffLat) + (diffLng * diffLng);

                    if (approximateDistanceSquared < shortestDistanceCalculated) {
                        shortestDistanceCalculated = approximateDistanceSquared;
                        matchedCurrentStop = checkpoint.name;
                    }
                });

                document.getElementById('radarCurrentStop').innerText = `Nearest Stop: ${matchedCurrentStop}`;

                const streamPayload = new URLSearchParams();
                streamPayload.append('busNumber', busNumber);
                streamPayload.append('busName', busName);
                streamPayload.append('sourceLatitude', currentLat.toString());   
                streamPayload.append('sourceLongitude', currentLng.toString());
                streamPayload.append('destinationLatitude', destLat ? destLat.toString() : currentLat.toString());
                streamPayload.append('destinationLongitude', destLng ? destLng.toString() : currentLng.toString());
                streamPayload.append('stops', stopsString);
                streamPayload.append('currentStop', matchedCurrentStop); 
                streamPayload.append('speed', currentSpeed.toString());

                fetch('/driver/update-location', {
                    method: 'POST',
                    body: streamPayload,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(res => res.text())
                .then(() => {
                    totalTransmissions++;
                    document.getElementById('txCounter').innerText = `${totalTransmissions} Tx`;
                    document.getElementById('lastTxTime').innerText = `Sent: ${new Date().toLocaleTimeString()}`;
                })
                .catch(err => console.error("Telemetry update failed:", err));
            },
            function(err) { console.error(err); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    document.getElementById('routeForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const busNumValue = document.getElementById('busNumber').value.trim();
        const busNameValue = document.getElementById('busName').value.trim();
        const sourceNameValue = document.getElementById('sourceName').value.trim();
        const midStopsValue = document.getElementById('midRouteStops').value.trim();
        const destNameValue = document.getElementById('destinationName').value.trim();

        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').innerHTML = `<span class="spinner-border spinner-border-sm"></span> Processing Locations...`;

        clearPreviousRoute();
        routeCoordinatesGeoRegistry = [];

        // 1. Resolve Source Location Context
        const srcResult = await resolveLocationInput(sourceNameValue, "Source Station");
        if (!srcResult) {
            alert(`Could not resolve location context for Source: "${sourceNameValue}"`);
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking`;
            return;
        }
        sourceLat = srcResult.lat;
        sourceLng = srcResult.lng;
        routeCoordinatesGeoRegistry.push(srcResult);

        document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
        sourceMarker = new google.maps.Marker({
            position: { lat: sourceLat, lng: sourceLng },
            map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/11104/11104234.png", scaledSize: new google.maps.Size(32, 32) }
        });

        // 2. Resolve Intermediate Route Anchors
        if (midStopsValue.length > 0) {
            const individualStops = midStopsValue.split(',');
            for (let rawStop of individualStops) {
                const cleanStop = rawStop.trim();
                if (cleanStop.length > 0) {
                    const geocodedStop = await resolveLocationInput(cleanStop, cleanStop);
                    if (geocodedStop) {
                        routeCoordinatesGeoRegistry.push(geocodedStop);
                        
                        const m = new google.maps.Marker({
                            position: { lat: geocodedStop.lat, lng: geocodedStop.lng },
                            map: map,
                            title: geocodedStop.name,
                            icon: { url: "https://cdn-icons-png.flaticon.com/512/2776/2776067.png", scaledSize: new google.maps.Size(28, 28) }
                        });
                        customMarkersArray.push(m);
                    }
                }
            }
        }

        // 3. Resolve Destination Location Context
        const destResult = await resolveLocationInput(destNameValue, "Destination Station");
        if (!destResult) {
            alert(`Could not resolve location context for Destination: "${destNameValue}"`);
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking`;
            return;
        }
        destLat = destResult.lat;
        destLng = destResult.lng;
        routeCoordinatesGeoRegistry.push(destResult);

        document.getElementById('lblDestCoords').innerText = `Coords: ${destLat.toFixed(4)}, ${destLng.toFixed(4)}`;
        destMarker = new google.maps.Marker({
            position: { lat: destLat, lng: destLng },
            map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/684/684908.png", scaledSize: new google.maps.Size(32, 32) }
        });

        // 4. Draw Polylines and Adjust Active Bounds
        drawRouteLine();
        updateMapBounds();

        let combinedStopsArrayString = sourceNameValue;
        if(midStopsValue.length > 0) combinedStopsArrayString += `, ${midStopsValue}`;
        combinedStopsArrayString += `, ${destNameValue}`;

        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-broadcast"></i> Engine Online & Tracking...`;
        initiateLiveTrackingPipeline(busNumValue, busNameValue, combinedStopsArrayString);
    });
</script>

</body>
</html>
