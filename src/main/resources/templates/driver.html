<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Transit Route Control Engine (Free Offline Edition)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .control-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-right: 1px solid #334155;
            min-height: 100vh;
        }
        #map {
            width: 100%;
            height: 100vh;
            background-color: #020617;
        }
        .form-control, .form-control:focus {
            background-color: #1e293b;
            border-color: #475569;
            color: #f8fafc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(34, 197, 94, 0.25);
            border-color: #22c55e;
        }
        .tracking-active {
            border-left: 4px solid #22c55e;
        }
        .coord-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-4 p-4 control-panel overflow-y-auto" id="consoleCard">
            <h4 class="mb-4 text-success"><i class="bi bi-radar me-2"></i>Route Dispatcher</h4>
            
            <form id="routeForm" novalidate>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label for="busNumber" class="form-label text-light small fw-bold">Bus Number</label>
                        <input type="text" id="busNumber" class="form-control" placeholder="e.g. TN-28-391" required>
                    </div>
                    <div class="col-6">
                        <label for="busName" class="form-label text-light small fw-bold">Route Title/Name</label>
                        <input type="text" id="busName" class="form-control" placeholder="e.g. TNC" required>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="sourceName" class="form-label text-success fw-bold m-0">Source Station</label>
                        <button type="button" class="btn btn-sm btn-outline-success py-0 px-2" id="btnGetGPS">
                            <i class="bi bi-geo-alt-fill"></i> Use GPS
                        </button>
                    </div>
                    <input type="text" id="sourceName" class="form-control mt-1" placeholder="e.g. Salem" required>
                    <div id="lblSourceCoords" class="coord-subtitle">Coords: Not Loaded</div>
                </div>

                <div class="mb-3">
                    <label for="midRouteStops" class="form-label text-warning fw-bold">Via Pass-Through Stations (Comma Separated)</label>
                    <input type="text" id="midRouteStops" class="form-control" placeholder="e.g. Harur">
                </div>

                <div class="mb-4">
                    <label for="destinationName" class="form-label text-info fw-bold">Destination Station</label>
                    <input type="text" id="destinationName" class="form-control" placeholder="e.g. Dharmapuri" required>
                    <div id="lblDestCoords" class="coord-subtitle">Coords: Not Loaded</div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success fw-bold py-2.5" id="btnSubmit">
                        <i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking
                    </button>
                    <button type="button" class="btn btn-outline-warning btn-sm" id="btnAddNewPlace">
                        <i class="bi bi-plus-circle-fill me-1"></i> Mark & Name Current Location
                    </button>
                </div>
            </form>

            <div id="trackingStatusCard" class="card bg-dark border-secondary mt-4 d-none">
                <div class="card-body p-3">
                    <h6 class="text-success border-bottom border-secondary pb-2 mb-2">
                        <i class="bi bi-broadcast spinning me-2"></i>Telemetry Uplink Active
                    </h6>
                    <div class="d-flex justify-content-between small mb-1">
                        <span id="radarCurrentStop" class="text-white-50">Nearest Stop: Calculating...</span>
                        <span id="txCounter" class="badge bg-success">0 Tx</span>
                    </div>
                    <div class="text-end text-muted" style="font-size: 0.75rem;" id="lastTxTime">
                        Awaiting link establishment...
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div id="map"></div>
        </div>
    </div>
</div>

<script>
    let map;
    let fallbackPolyline = null;
    
    let sourceLat = null, sourceLng = null; 
    let destLat = null, destLng = null;     
    let liveWatchId = null;
    let totalTransmissions = 0;
    
    let routeCoordinatesGeoRegistry = [];
    let customMarkersArray = [];
    
    let sourceMarker = null;
    let destMarker = null;
    let driverLiveMarker = null;

    const darkMapStyle = [
        { "elementType": "geometry", "stylers": [{ "color": "#0f172a" }] },
        { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
        { "elementType": "labels.text.stroke", "stylers": [{ "color": "#0f172a" }] },
        { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
        { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#22c55e" }] },
        { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
        { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#334155" }] },
        { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#334155" }] },
        { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#020617" }] }
    ];

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 11.9000, lng: 78.3500 }, 
            zoom: 9,
            styles: darkMapStyle,
            disableDefaultUI: false
        });
    }

    function clearPreviousRoute() {
        if (fallbackPolyline) fallbackPolyline.setMap(null);
        if (sourceMarker) sourceMarker.setMap(null);
        if (destMarker) destMarker.setMap(null);
        customMarkersArray.forEach(m => m.setMap(null));
        customMarkersArray = [];
    }

    function resetSubmitButton() {
        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking`;
    }

    function updateMapBounds() {
        const bounds = new google.maps.LatLngBounds();
        let markerCount = 0;

        if (sourceMarker) { bounds.extend(sourceMarker.getPosition()); markerCount++; }
        if (destMarker) { bounds.extend(destMarker.getPosition()); markerCount++; }
        if (driverLiveMarker) { bounds.extend(driverLiveMarker.getPosition()); markerCount++; }
        customMarkersArray.forEach(m => { bounds.extend(m.getPosition()); markerCount++; });
        
        if (markerCount > 1) {
            map.fitBounds(bounds);
        } else if (markerCount === 1) {
            map.setCenter(bounds.getCenter());
            map.setZoom(12);
        }
    }

    // NEW: Open Source Routing Machine Engine (No API key needed)
    function drawRouteLine() {
        if (routeCoordinatesGeoRegistry.length < 2) return;
        if (fallbackPolyline) fallbackPolyline.setMap(null);

        let routeLineColor = '#22c55e'; 
        let routeWeight = 5;
        
        if (routeCoordinatesGeoRegistry.length > 2) {
            routeLineColor = '#ec4899'; 
            routeWeight = 6;            
        }

        // Format coordinates as lng,lat separated by semicolons for OSRM API
        const coordString = routeCoordinatesGeoRegistry.map(pt => `${pt.lng},${pt.lat}`).join(';');
        const url = `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.code === "Ok" && data.routes.length > 0) {
                    // Map OSRM GeoJSON geometry track array directly to Google Map coordinate paths
                    const googlePathCoords = data.routes[0].geometry.coordinates.map(coord => ({
                        lat: coord[1],
                        lng: coord[0]
                    }));

                    fallbackPolyline = new google.maps.Polyline({
                        path: googlePathCoords,
                        geodesic: true,
                        strokeColor: routeLineColor,
                        strokeOpacity: 0.85,
                        strokeWeight: routeWeight
                    });
                    fallbackPolyline.setMap(map);
                } else {
                    drawFallbackStraightLine(routeLineColor, routeWeight);
                }
            })
            .catch(err => {
                console.warn("OSRM Routing failed, drawing straight fallback track:", err);
                drawFallbackStraightLine(routeLineColor, routeWeight);
            });
    }

    function drawFallbackStraightLine(color, weight) {
        const straightLinePathCoords = routeCoordinatesGeoRegistry.map(pt => ({ lat: pt.lat, lng: pt.lng }));
        fallbackPolyline = new google.maps.Polyline({
            path: straightLinePathCoords,
            geodesic: true,
            strokeColor: color === '#22c55e' ? '#eab308' : color,
            strokeOpacity: 0.8,
            strokeWeight: weight
        });
        fallbackPolyline.setMap(map);
    }

    async function resolveLocationInput(inputText, defaultLabel) {
        let cleanText = inputText.trim();
        let coordsPattern = /^([-+]?\d+\.\d+),\s*([-+]?\d+\.\d+)$/;
        let match = cleanText.match(coordsPattern);
        
        if (match) {
            return {
                name: defaultLabel,
                lat: parseFloat(match[1]),
                lng: parseFloat(match[2])
            };
        }
        return await geocodePromise(cleanText);
    }

    // NEW: OpenStreetMap Nominatim Geocoding Engine (No billing/No API keys required)
	function geocodePromise(addressText) {
	    return new Promise((resolve) => {
	        let queryText = addressText.trim();
	        
	        // If the user accidentally inputted a string containing a comma list, 
	        // extract just the first element to prevent Nominatim from crashing
	        if (queryText.includes(",")) {
	            queryText = queryText.split(",")[0].trim();
	        }
	        if (queryText.includes("|")) {
	            queryText = queryText.split("|")[0].trim();
	        }
	        
	        const finalQuery = `${queryText}, Tamil Nadu, India`;
	        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(finalQuery)}&format=json&limit=1`;

	        fetch(url, {
	            headers: { 'User-Agent': 'LiveTransitTrackingEngineTestApp' }
	        })
	            .then(response => response.json())
	            .then(data => {
	                if (data && data.length > 0) {
	                    resolve({
	                        name: queryText,
	                        lat: parseFloat(data[0].lat),
	                        lng: parseFloat(data[0].lon)
	                    });
	                } else {
	                    console.error(`Nominatim search found zero results for phrase: [${queryText}]`);
	                    resolve(null);
	                }
	            })
	            .catch(err => {
	                console.error("Nominatim Network Lookup Exception:", err);
	                resolve(null);
	            });
	    });
	}

    document.getElementById('btnGetGPS').addEventListener('click', function() {
        const btn = this;
        if (!navigator.geolocation) {
            alert("Geolocation services unavailable inside this layout framework.");
            return;
        }
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Syncing...`;

        navigator.geolocation.getCurrentPosition(
            function(position) {
                sourceLat = position.coords.latitude;
                sourceLng = position.coords.longitude;
                document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                document.getElementById('sourceName').value = `${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
            },
            function() {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                alert("Could not pull location tracking hardware parameters.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });

    document.getElementById('btnAddNewPlace').addEventListener('click', function() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function(position) {
            const currentLat = position.coords.latitude;
            const currentLng = position.coords.longitude;
            const label = prompt("Confirm location coordinates descriptor name:", `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`);
            if (label) {
                const midStopsInput = document.getElementById('midRouteStops');
                midStopsInput.value = midStopsInput.value.trim() === "" ? label : `${midStopsInput.value}, ${label}`;
            }
        });
    });

    function initiateLiveTrackingPipeline(busNumber, busName, stopsString) {
        if (!navigator.geolocation) return;

        document.getElementById('consoleCard').classList.add('tracking-active');
        document.getElementById('trackingStatusCard').classList.remove('d-none');

        if(liveWatchId) navigator.geolocation.clearWatch(liveWatchId);

        liveWatchId = navigator.geolocation.watchPosition(
            function(position) {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;
                const currentSpeed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0; 

                if (driverLiveMarker) driverLiveMarker.setMap(null);
                
                driverLiveMarker = new google.maps.Marker({
                    position: { lat: currentLat, lng: currentLng },
                    map: map,
                    icon: { url: "https://cdn-icons-png.flaticon.com/512/3448/3448339.png", scaledSize: new google.maps.Size(38, 38) }
                });

                let matchedCurrentStop = routeCoordinatesGeoRegistry[0] ? routeCoordinatesGeoRegistry[0].name : "In Transit";
                let shortestDistanceCalculated = Infinity;

                routeCoordinatesGeoRegistry.forEach(checkpoint => {
                    const diffLat = currentLat - checkpoint.lat;
                    const diffLng = currentLng - checkpoint.lng;
                    const approximateDistanceSquared = (diffLat * diffLat) + (diffLng * diffLng);

                    if (approximateDistanceSquared < shortestDistanceCalculated) {
                        shortestDistanceCalculated = approximateDistanceSquared;
                        matchedCurrentStop = checkpoint.name;
                    }
                });

                document.getElementById('radarCurrentStop').innerText = `Nearest Stop: ${matchedCurrentStop}`;

                const streamPayload = new URLSearchParams();
                streamPayload.append('busNumber', busNumber);
                streamPayload.append('busName', busName);
                streamPayload.append('sourceLatitude', currentLat.toString());   
                streamPayload.append('sourceLongitude', currentLng.toString());
                streamPayload.append('destinationLatitude', destLat ? destLat.toString() : currentLat.toString());
                streamPayload.append('destinationLongitude', destLng ? destLng.toString() : currentLng.toString());
                streamPayload.append('stops', stopsString);
                streamPayload.append('currentStop', matchedCurrentStop); 
                streamPayload.append('speed', currentSpeed.toString());

                fetch('/driver/update-location', {
                    method: 'POST',
                    body: streamPayload,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(res => res.text())
                .then(() => {
                    totalTransmissions++;
                    document.getElementById('txCounter').innerText = `${totalTransmissions} Tx`;
                    document.getElementById('lastTxTime').innerText = `Sent: ${new Date().toLocaleTimeString()}`;
                })
                .catch(err => console.error("Telemetry link update failure:", err));
            },
            function(err) { console.error(err); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    document.getElementById('routeForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const busNumValue = document.getElementById('busNumber').value.trim();
        const busNameValue = document.getElementById('busName').value.trim();
        const sourceNameValue = document.getElementById('sourceName').value.trim();
        const midStopsValue = document.getElementById('midRouteStops').value.trim();
        const destNameValue = document.getElementById('destinationName').value.trim();

        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').innerHTML = `<span class="spinner-border spinner-border-sm"></span> Resolving Nodes Free Tier...`;

        clearPreviousRoute();
        routeCoordinatesGeoRegistry = [];

        // 1. Process Source Node Lookups via Nominatim
        const srcResult = await resolveLocationInput(sourceNameValue, "Source Station");
        if (!srcResult) {
            alert(`Could not resolve location match for text: "${sourceNameValue}"`);
            resetSubmitButton();
            return;
        }
        sourceLat = srcResult.lat;
        sourceLng = srcResult.lng;
        routeCoordinatesGeoRegistry.push(srcResult);

        document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
        sourceMarker = new google.maps.Marker({
            position: { lat: sourceLat, lng: sourceLng },
            map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/11104/11104234.png", scaledSize: new google.maps.Size(32, 32) }
        });

        // 2. Process Passing Stops Via Free Tier Loop
        if (midStopsValue.length > 0) {
            const individualStops = midStopsValue.split(',');
            for (let rawStop of individualStops) {
                const cleanStop = rawStop.trim();
                if (cleanStop.length > 0) {
                    const geocodedStop = await resolveLocationInput(cleanStop, cleanStop);
                    if (geocodedStop) {
                        routeCoordinatesGeoRegistry.push(geocodedStop);
                        
                        const m = new google.maps.Marker({
                            position: { lat: geocodedStop.lat, lng: geocodedStop.lng },
                            map: map,
                            title: geocodedStop.name,
                            icon: { url: "https://cdn-icons-png.flaticon.com/512/2776/2776067.png", scaledSize: new google.maps.Size(28, 28) }
                        });
                        customMarkersArray.push(m);
                    } else {
                        alert(`Could not resolve midpoint marker: "${cleanStop}"`);
                        resetSubmitButton();
                        return;
                    }
                    // Adding a tiny sleep interval delay ensures compliance with OpenStreetMap rate limits during multi-stop lookups
                    await new Promise(r => setTimeout(r, 300));
                }
            }
        }

        // 3. Process Destination Coordinates via Nominatim
        const destResult = await resolveLocationInput(destNameValue, "Destination Station");
        if (!destResult) {
            alert(`Could not resolve location match for Destination: "${destNameValue}"`);
            resetSubmitButton();
            return;
        }
        destLat = destResult.lat;
        destLng = destResult.lng;
        routeCoordinatesGeoRegistry.push(destResult);

        document.getElementById('lblDestCoords').innerText = `Coords: ${destLat.toFixed(4)}, ${destLng.toFixed(4)}`;
        destMarker = new google.maps.Marker({
            position: { lat: destLat, lng: destLng },
            map: map,
            icon: { url: "https://cdn-icons-png.flaticon.com/512/684/684908.png", scaledSize: new google.maps.Size(32, 32) }
        });

        // 4. Trace OSRM Route Polylines and Adjust Camera Matrix
        drawRouteLine();
        updateMapBounds();

        let combinedStopsArrayString = sourceNameValue;
        if(midStopsValue.length > 0) combinedStopsArrayString += `, ${midStopsValue}`;
        combinedStopsArrayString += `, ${destNameValue}`;

        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-broadcast"></i> Engine Online & Tracking...`;
        initiateLiveTrackingPipeline(busNumValue, busNameValue, combinedStopsArrayString);
    });
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCF9GcWnQz-IeVXBfzbpVWntKppkLm1YpA&loading=async&callback=initMap" defer></script>

</body>
</html>
