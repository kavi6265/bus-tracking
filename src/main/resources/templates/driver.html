<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Console - Map Deployment</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary: #22c55e;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px 0;
        }
        .driver-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        #map {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }
        .coordinate-badge {
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-12">
            
            <div class="driver-card">
                <h3 class="mb-4 text-center">
                    <i class="bi bi-map-fill text-success me-2"></i> Route Deployment Console
                </h3>
                
                <div class="row g-4">
                    <div class="col-md-5 col-12">
                        <form id="routeForm">
                            <div class="mb-3">
                                <label for="busNumber" class="form-label fw-semibold">Bus Number</label>
                                <input type="text" id="busNumber" class="form-control bg-dark text-white border-secondary" placeholder="e.g., 21G" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="busName" class="form-label fw-semibold">Bus Name / Label</label>
                                <input type="text" id="busName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Express Liner" required>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="sourceName" class="form-label fw-semibold text-success mb-0">Source Station</label>
                                    <button type="button" id="btnGetGPS" class="btn btn-outline-success btn-sm py-0 px-2" style="font-size: 0.8rem;">
                                        <i class="bi bi-geo-alt-fill"></i> Use GPS
                                    </button>
                                </div>
                                <input type="text" id="sourceName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Chennai" required>
                                <div class="coordinate-badge mt-1" id="lblSourceCoords">Coords: Not Loaded</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="destinationName" class="form-label fw-semibold text-info">Destination Station</label>
                                <input type="text" id="destinationName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Madurai" required>
                                <div class="coordinate-badge mt-1" id="lblDestCoords">Coords: Not Loaded</div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy Route
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="col-md-7 col-12 d-flex flex-column">
                        <label class="form-label fw-semibold text-secondary">Live Route Preview Anchors</label>
                        <div id="map"></div>
                    </div>
                </div>

            </div>
            
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Set up standard regional context coordinates (Tamil Nadu center focus layout)
    let sourceLat = 13.0827, sourceLng = 80.2707; // Default Chennai
    let destLat = 9.9252, destLng = 78.1198;     // Default Madurai

    const map = L.map('map').setView([11.1271, 78.6569], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Track dynamic layer pinpoint objects
    let sourceMarker = null;
    let destMarker = null;

    // Standard icons configuration
    const sourceIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/11104/11104234.png",
        iconSize: [32, 32], iconAnchor: [16, 32]
    });

    const destIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
        iconSize: [32, 32], iconAnchor: [16, 32]
    });

    // Helper function to dynamically auto-adjust map boundary zoom views
    function updateMapBounds() {
        if (sourceMarker && destMarker) {
            const bounds = L.latLngBounds([sourceMarker.getLatLng(), destMarker.getLatLng()]);
            map.fitBounds(bounds, { padding: [50, 50] });
        } else if (sourceMarker) {
            map.setView(sourceMarker.getLatLng(), 13);
        } else if (destMarker) {
            map.setView(destMarker.getLatLng(), 13);
        }
    }

    // Use OpenStreetMap Nominatim Engine to quickly translate string user queries into real lat/long coordinates
    async function lookupLocation(query, isSource) {
        if (!query || query.length < 3) return;
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await response.json();
            
            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lng = parseFloat(data[0].lon);
                
                if (isSource) {
                    sourceLat = lat;
                    sourceLng = lng;
                    document.getElementById('lblSourceCoords').innerText = `Coords: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    
                    if (sourceMarker) map.removeLayer(sourceMarker);
                    sourceMarker = L.marker([lat, lng], { icon: sourceIcon }).addTo(map).bindPopup(`<b>Source:</b> ${query}`).openPopup();
                } else {
                    destLat = lat;
                    destLng = lng;
                    document.getElementById('lblDestCoords').innerText = `Coords: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    
                    if (destMarker) map.removeLayer(destMarker);
                    destMarker = L.marker([lat, lng], { icon: destIcon }).addTo(map).bindPopup(`<b>Destination:</b> ${query}`).openPopup();
                }

                updateMapBounds();
            }
        } catch (error) {
            console.error("Geocoding lookup errors occurred seamlessly:", error);
        }
    }

    /* ========================================================
       DEVICE GPS POSITION EXTRACTION & REVERSE GEOMATCHING
       ======================================================== */
    document.getElementById('btnGetGPS').addEventListener('click', function() {
        const btn = this;
        
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser software version.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Syncing...`;

        navigator.geolocation.getCurrentPosition(
            async function(position) {
                sourceLat = position.coords.latitude;
                sourceLng = position.coords.longitude;
                
                // Update Badge Elements Immediately
                document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                
                // Render marker directly from precise coordinates
                if (sourceMarker) map.removeLayer(sourceMarker);
                sourceMarker = L.marker([sourceLat, sourceLng], { icon: sourceIcon }).addTo(map);
                updateMapBounds();

                // Reverse Geocoding via Nominatim to populate textual location strings nicely
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${sourceLat}&lon=${sourceLng}&zoom=18&addressdetails=1`);
                    const data = await response.json();
                    
                    if (data && data.display_name) {
                        // Truncate to a readable portion (e.g., street or suburb name if available)
                        const cleanAddress = data.address.road || data.address.suburb || data.address.city || data.display_name.split(',')[0];
                        document.getElementById('sourceName').value = cleanAddress;
                        sourceMarker.bindPopup(`<b>Source (Current GPS):</b> ${cleanAddress}`).openPopup();
                    } else {
                        document.getElementById('sourceName').value = "Current Location";
                        sourceMarker.bindPopup(`<b>Source:</b> Current GPS Position`).openPopup();
                    }
                } catch (err) {
                    console.error("Failed handling address naming reverse lookup strings:", err);
                    document.getElementById('sourceName').value = "Current Location";
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                }
            },
            function(error) {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        alert("Permission denied. Please grant location access configurations in your browser settings.");
                        break;
                    case error.POSITION_UNAVAILABLE:
                        alert("Location tracking details are currently unavailable from network hardware points.");
                        break;
                    case error.TIMEOUT:
                        alert("Request setup to pull physical device metrics timed out.");
                        break;
                    default:
                        alert("An unknown mapping hardware glitch context occurred.");
                        break;
                }
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    });

    // Capture typing events directly to update map tracking bounds gracefully
    document.getElementById('sourceName').addEventListener('blur', function() {
        lookupLocation(this.value, true);
    });

    document.getElementById('destinationName').addEventListener('blur', function() {
        lookupLocation(this.value, false);
    });

    /* ========================================================
       BACKEND TRANSMISSION DATA SYNC CONTEXT
       ======================================================== */
    document.getElementById('routeForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const busNumValue = document.getElementById('busNumber').value.trim();
        const busNameValue = document.getElementById('busName').value.trim();
        const sourceNameValue = document.getElementById('sourceName').value.trim();
        const destNameValue = document.getElementById('destinationName').value.trim();

        const dataPayload = new URLSearchParams();
        dataPayload.append('busNumber', busNumValue);
        dataPayload.append('busName', busNameValue);
        dataPayload.append('sourceLatitude', sourceLat.toString());
        dataPayload.append('sourceLongitude', sourceLng.toString());
        dataPayload.append('destinationLatitude', destLat.toString());
        dataPayload.append('destinationLongitude', destLng.toString());
        
        const routeStopsString = `${sourceNameValue}, Pass-Through Station, ${destNameValue}`;
        dataPayload.append('stops', routeStopsString);

        fetch('/driver/update-location', {
            method: 'POST',
            body: dataPayload,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(res => res.text())
        .then(responseToken => {
            if (responseToken === "ROUTE_SAVED" || responseToken === "SUCCESS") {
                alert("Route metrics deployed successfully into system memory!");
                window.location.href = "/dashboard";
            } else {
                alert("Server saved data but returned status code token: " + responseToken);
            }
        })
        .catch(err => console.error("Upstream deployment transmission failures occurred:", err));
    });
</script>

</body>
</html>
