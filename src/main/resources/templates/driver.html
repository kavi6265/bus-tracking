<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Console - Map Deployment</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary: #22c55e;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px 0;
        }
        .driver-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        #map {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }
        .coordinate-badge {
            font-size: 11px;
            color: var(--muted);
        }
        .tracking-active {
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-12">
            
            <div class="driver-card" id="consoleCard">
                <h3 class="mb-4 text-center">
                    <i class="bi bi-map-fill text-success me-2"></i> Route Deployment Console
                </h3>
                
                <div class="row g-4">
                    <div class="col-md-5 col-12">
                        <form id="routeForm">
                            <div class="mb-3">
                                <label for="busNumber" class="form-label fw-semibold">Bus Number</label>
                                <input type="text" id="busNumber" class="form-control bg-dark text-white border-secondary" placeholder="e.g., 21G" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="busName" class="form-label fw-semibold">Bus Name / Label</label>
                                <input type="text" id="busName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Express Liner" required>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="sourceName" class="form-label fw-semibold text-success mb-0">Source Station</label>
                                    <button type="button" id="btnGetGPS" class="btn btn-outline-success btn-sm py-0 px-2" style="font-size: 0.8rem;">
                                        <i class="bi bi-geo-alt-fill"></i> Use GPS
                                    </button>
                                </div>
                                <input type="text" id="sourceName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Chennai" required>
                                <div class="coordinate-badge mt-1" id="lblSourceCoords">Coords: Not Loaded</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="midRouteStops" class="form-label fw-semibold text-warning">Via Pass-Through Stations (Comma Separated)</label>
                                <input type="text" id="midRouteStops" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Viluppuram, Trichy">
                            </div>

                            <div class="mb-4">
                                <label for="destinationName" class="form-label fw-semibold text-info">Destination Station</label>
                                <input type="text" id="destinationName" class="form-control bg-dark text-white border-secondary" placeholder="e.g., Madurai" required>
                                <div class="coordinate-badge mt-1" id="lblDestCoords">Coords: Not Loaded</div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" id="btnSubmit" class="btn btn-success w-100 py-2 fw-bold">
                                    <i class="bi bi-cloud-arrow-up-fill me-2"></i> Deploy & Start Tracking
                                </button>
                            </div>
                        </form>
                        
                        <div id="trackingStatusCard" class="mt-4 p-3 bg-dark border border-success rounded-3 d-none">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <div class="text-success fw-bold"><i class="bi bi-broadcast text-danger"></i> Live Transmission Active</div>
                                    <div class="text-warning small mt-1" id="radarCurrentStop">Current: Calculating...</div>
                                    <small class="text-muted" id="lastTxTime">Waiting for first sync...</small>
                                </div>
                                <span class="badge bg-success" id="txCounter">0 Tx</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-7 col-12 d-flex flex-column">
                        <label class="form-label fw-semibold text-secondary">Live Route Preview Anchors</label>
                        <div id="map"></div>
                    </div>
                    
                </div>

            </div>
            
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Geoapify Configuration
    const GEOAPIFY_API_KEY = "91d42b9ca4dd43afaa47d2621398a92c";

    let sourceLat = 13.0827, sourceLng = 80.2707; 
    let destLat = 9.9252, destLng = 78.1198;     
    let liveWatchId = null;
    let totalTransmissions = 0;
    
    // Memory arrays to save coordinate footprints of route checkpoints
    let routeCoordinatesGeoRegistry = [];

    const map = L.map('map').setView([11.1271, 78.6569], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let sourceMarker = null;
    let destMarker = null;
    let driverLiveMarker = null;

    const sourceIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/11104/11104234.png",
        iconSize: [32, 32], iconAnchor: [16, 32]
    });

    const destIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
        iconSize: [32, 32], iconAnchor: [16, 32]
    });

    const busLiveIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/3448/3448339.png",
        iconSize: [38, 38], iconAnchor: [19, 19]
    });

    function updateMapBounds() {
        const markers = [];
        if (sourceMarker) markers.push(sourceMarker.getLatLng());
        if (destMarker) markers.push(destMarker.getLatLng());
        if (driverLiveMarker) markers.push(driverLiveMarker.getLatLng());
        
        if (markers.length > 1) {
            map.fitBounds(L.latLngBounds(markers), { padding: [50, 50] });
        } else if (markers.length === 1) {
            map.setView(markers[0], 14);
        }
    }

    async function lookupLocation(query, isSource) {
        if (!query || query.length < 3) return null;
        try {
            // Geoapify Geocoding Endpoint
            const response = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(query)}&limit=1&apiKey=${GEOAPIFY_API_KEY}`);
            const data = await response.json();
            
            if (data && data.features && data.features.length > 0) {
                // Geoapify features store long/lat in an array: [longitude, latitude]
                const lng = parseFloat(data.features[0].geometry.coordinates[0]);
                const lat = parseFloat(data.features[0].geometry.coordinates[1]);
                
                if (isSource) {
                    sourceLat = lat; sourceLng = lng;
                    document.getElementById('lblSourceCoords').innerText = `Coords: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    if (sourceMarker) map.removeLayer(sourceMarker);
                    sourceMarker = L.marker([lat, lng], { icon: sourceIcon }).addTo(map).bindPopup(`<b>Source:</b> ${query}`).openPopup();
                } else {
                    destLat = lat; destLng = lng;
                    document.getElementById('lblDestCoords').innerText = `Coords: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    if (destMarker) map.removeLayer(destMarker);
                    destMarker = L.marker([lat, lng], { icon: destIcon }).addTo(map).bindPopup(`<b>Destination:</b> ${query}`).openPopup();
                }
                updateMapBounds();
                return { name: query, lat: lat, lng: lng };
            }
        } catch (error) {
            console.error("Geoapify Geocoding lookup error:", error);
        }
        return null;
    }

    document.getElementById('btnGetGPS').addEventListener('click', function() {
        const btn = this;
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser.");
            return;
        }
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Syncing...`;

        navigator.geolocation.getCurrentPosition(
            async function(position) {
                sourceLat = position.coords.latitude;
                sourceLng = position.coords.longitude;
                document.getElementById('lblSourceCoords').innerText = `Coords: ${sourceLat.toFixed(4)}, ${sourceLng.toFixed(4)}`;
                
                if (sourceMarker) map.removeLayer(sourceMarker);
                sourceMarker = L.marker([sourceLat, sourceLng], { icon: sourceIcon }).addTo(map);
                updateMapBounds();

                try {
                    // Geoapify Reverse Geocoding Endpoint
                    const response = await fetch(`https://api.geoapify.com/v1/geocode/reverse?lat=${sourceLat}&lon=${sourceLng}&apiKey=${GEOAPIFY_API_KEY}`);
                    const data = await response.json();
                    
                    if (data && data.features && data.features.length > 0) {
                        const props = data.features[0].properties;
                        const cleanAddress = props.street || props.suburb || props.city || props.name || "Current Location";
                        document.getElementById('sourceName').value = cleanAddress;
                        sourceMarker.bindPopup(`<b>Source (GPS):</b> ${cleanAddress}`).openPopup();
                    } else {
                        document.getElementById('sourceName').value = "Current Location";
                    }
                } catch (err) {
                    document.getElementById('sourceName').value = "Current Location";
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                }
            },
            function() {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-geo-alt-fill"></i> Use GPS`;
                alert("Could not pull location data metrics safely.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });

    document.getElementById('sourceName').addEventListener('blur', function() { lookupLocation(this.value, true); });
    document.getElementById('destinationName').addEventListener('blur', function() { lookupLocation(this.value, false); });

    /* ========================================================
       LIVE TELEMETRY ENGINE WITH RADAR GEO-TRACKING MATCHING
       ======================================================== */
    function initiateLiveTrackingPipeline(busNumber, busName, stopsString) {
        if (!navigator.geolocation) return;

        document.getElementById('consoleCard').classList.add('tracking-active');
        document.getElementById('trackingStatusCard').classList.remove('d-none');

        liveWatchId = navigator.geolocation.watchPosition(
            function(position) {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;
                const currentSpeed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0; 

                if (driverLiveMarker) map.removeLayer(driverLiveMarker);
                driverLiveMarker = L.marker([currentLat, currentLng], { icon: busLiveIcon })
                                    .addTo(map)
                                    .bindPopup(`<b>Live Bus Core Telemetry</b><br>Speed: ${currentSpeed} km/h`)
                                    .openPopup();
                updateMapBounds();

                // 📐 RADAR CHECKPOINT MATH: Find the chronologically closest station to light up on the timeline 
                let matchedCurrentStop = routeCoordinatesGeoRegistry[0] ? routeCoordinatesGeoRegistry[0].name : "Unknown Station";
                let shortestDistanceCalculated = Infinity;

                routeCoordinatesGeoRegistry.forEach(checkpoint => {
                    const diffLat = currentLat - checkpoint.lat;
                    const diffLng = currentLng - checkpoint.lng;
                    const approximateDistanceSquared = (diffLat * diffLat) + (diffLng * diffLng);

                    if (approximateDistanceSquared < shortestDistanceCalculated) {
                        shortestDistanceCalculated = approximateDistanceSquared;
                        matchedCurrentStop = checkpoint.name;
                    }
                });

                // Display localized computed stop inside driver view layout
                if(document.getElementById('radarCurrentStop')) {
                    document.getElementById('radarCurrentStop').innerText = `Nearest Stop: ${matchedCurrentStop}`;
                }

                // Build modern form-urlencoded stream payload
                const streamPayload = new URLSearchParams();
                streamPayload.append('busNumber', busNumber);
                streamPayload.append('busName', busName);
                streamPayload.append('sourceLatitude', currentLat.toString());   
                streamPayload.append('sourceLongitude', currentLng.toString());
                streamPayload.append('destinationLatitude', destLat.toString());
                streamPayload.append('destinationLongitude', destLng.toString());
                streamPayload.append('stops', stopsString);
                streamPayload.append('currentStop', matchedCurrentStop); 
                streamPayload.append('speed', currentSpeed.toString());

                fetch('/driver/update-location', {
                    method: 'POST',
                    body: streamPayload,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(res => res.text())
                .then(status => {
                    totalTransmissions++;
                    document.getElementById('txCounter').innerText = `${totalTransmissions} Tx`;
                    document.getElementById('lastTxTime').innerText = `Sent: ${new Date().toLocaleTimeString()}`;
                })
                .catch(err => console.error("Telemetry pipeline delivery failure:", err));
            },
            function(err) { console.error("Hardware tracking issue:", err); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    // Geocode array converter for the full route timeline tracking database strings using Geoapify
    async function preCompileTimelineGeocodeFootprints(source, viaStopsString, destination) {
        routeCoordinatesGeoRegistry = [];
        
        // Add Source Station coordinates to the registry
        routeCoordinatesGeoRegistry.push({ name: source, lat: sourceLat, lng: sourceLng });

        // Parse and geocode middle stops sequentially
        if (viaStopsString) {
            const individualStops = viaStopsString.split(',');
            for (let rawStop of individualStops) {
                const cleanStop = rawStop.trim();
                if (cleanStop.length > 0) {
                    try {
                        const res = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(cleanStop)}&limit=1&apiKey=${GEOAPIFY_API_KEY}`);
                        const parsedData = await res.json();
                        if (parsedData && parsedData.features && parsedData.features.length > 0) {
                            routeCoordinatesGeoRegistry.push({
                                name: cleanStop,
                                lat: parseFloat(parsedData.features[0].geometry.coordinates[1]),
                                lng: parseFloat(parsedData.features[0].geometry.coordinates[0])
                            });
                        }
                    } catch (e) {
                        console.error("Failed to map mid-stop geocode tracking index:", cleanStop, e);
                    }
                }
            }
        }

        // Add Destination Station coordinates to finish array mapping
        routeCoordinatesGeoRegistry.push({ name: destination, lat: destLat, lng: destLng });
    }

    document.getElementById('routeForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const busNumValue = document.getElementById('busNumber').value.trim();
        const busNameValue = document.getElementById('busName').value.trim();
        const sourceNameValue = document.getElementById('sourceName').value.trim();
        const midStopsValue = document.getElementById('midRouteStops').value.trim();
        const destNameValue = document.getElementById('destinationName').value.trim();

        // Standardized array string generation
        let combinedStopsArrayString = sourceNameValue;
        if(midStopsValue.length > 0) combinedStopsArrayString += `, ${midStopsValue}`;
        combinedStopsArrayString += `, ${destNameValue}`;

        // Turn button into loading state while coordinates download
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').innerHTML = `<span class="spinner-border spinner-border-sm"></span> Compiling Route Matrix...`;

        // Wait for asynchronous geocoding layout maps to verify coordinate arrays completely
        await preCompileTimelineGeocodeFootprints(sourceNameValue, midStopsValue, destNameValue);

        // Turn live background tracking tracking pipeline instantly active
        document.getElementById('btnSubmit').innerHTML = `<i class="bi bi-broadcast"></i> Engine Online & Tracking...`;
        initiateLiveTrackingPipeline(busNumValue, busNameValue, combinedStopsArrayString);
        
        alert("Live synchronization pipeline active! Keep this dashboard tab open during transit.");
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.error('Service Worker Error:', err));
    });
}
</script>
</body>
</html>
