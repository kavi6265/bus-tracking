<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - NewProject</title>
	<link rel="icon" type="image/png" href="/icons/icon-192.png">
	<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#22c55e">
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* Matches the Signup form container */
        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-4px);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #222;
            font-size: 1.6rem;
        }

        /* Input styling consistent with Signup */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            color: #555;
        }
		.loader-spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #f3f3f3;
    border-top: 6px solid #4a90e2;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% {
        transform: rotate(360deg);
    }
}

        /* Button styling matching the Register button */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: filter 0.2s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .alert-error { background-color: #ffebee; color: var(--error-color); border: 1px solid #ffcdd2; }
        .alert-success { background-color: #e8f5e9; color: var(--success-color); border: 1px solid #c8e6c9; }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 25px 0;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Login</h2>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Logged out successfully.
        </div>

        <form id="loginForm" th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            
            <button type="submit">Sign In</button>
        </form>

        <hr>
        
        <p style="font-size: 0.9rem; color: #666;">
            New here? <a th:href="@{/signup}">Create an Account</a>
        </p>
		<div class="forgot-password">
		        <a th:href="@{/forgot-password}">Forgot Password?</a>
		    </div>
	<div id="loader" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
">

    <div id="threeBus"></div>

    <h3 style="color:white">
        Connecting To Bus Tracker...
    </h3>

</div>
    </div>
	<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const loader = document.getElementById("loader");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    300 / 300,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true
});

renderer.setSize(300, 300);
document.getElementById("threeBus").appendChild(renderer.domElement);

// Bus Body
const busGroup = new THREE.Group();

const body = new THREE.Mesh(
    new THREE.BoxGeometry(4, 1.5, 1.8),
    new THREE.MeshPhongMaterial({ color: 0x22c55e })
);

busGroup.add(body);

// Roof
const roof = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 0.8, 1.8),
    new THREE.MeshPhongMaterial({ color: 0x16a34a })
);

roof.position.y = 1;
busGroup.add(roof);

// Wheels
const wheelGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 32);

function createWheel(x, z) {
    const wheel = new THREE.Mesh(
        wheelGeometry,
        new THREE.MeshPhongMaterial({ color: 0x111111 })
    );

    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(x, -1, z);

    busGroup.add(wheel);

    return wheel;
}

const w1 = createWheel(-1.5, 1);
const w2 = createWheel(1.5, 1);
const w3 = createWheel(-1.5, -1);
const w4 = createWheel(1.5, -1);

scene.add(busGroup);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 5, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 1));

camera.position.z = 8;

function animate() {
    requestAnimationFrame(animate);

    busGroup.rotation.y += 0.01;

    w1.rotation.x += 0.15;
    w2.rotation.x += 0.15;
    w3.rotation.x += 0.15;
    w4.rotation.x += 0.15;

    renderer.render(scene, camera);
}

animate();

window.showLoader = () => {
    loader.style.display = "flex";
};

window.hideLoader = () => {
    loader.style.display = "none";
};
		document.getElementById("loginForm")
.addEventListener("submit", () => {
    showLoader();
});
		
		function showLoader() {
    document.getElementById("loader").style.display = "flex";
}

function hideLoader() {
    document.getElementById("loader").style.display = "none";
}
</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
		
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker Error:', err));
        });
    }
    </script>
</body>
</html>
