<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - NewProject</title>
	<link rel="icon" type="image/png" href="/icons/icon-192.png">
	<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#22c55e">
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* Matches the Signup form container */
        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-4px);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #222;
            font-size: 1.6rem;
        }

        /* Input styling consistent with Signup */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            color: #555;
        }

        /* Button styling matching the Register button */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: filter 0.2s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .alert-error { background-color: #ffebee; color: var(--error-color); border: 1px solid #ffcdd2; }
        .alert-success { background-color: #e8f5e9; color: var(--success-color); border: 1px solid #c8e6c9; }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 25px 0;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Login</h2>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            
            <button type="submit">Sign In</button>
        </form>

        <hr>
        
        <p style="font-size: 0.9rem; color: #666;">
            New here? <a th:href="@{/signup}">Create an Account</a>
        </p>
		<div class="forgot-password">
		        <a th:href="@{/forgot-password}">Forgot Password?</a>
		    </div>
    </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker Error:', err));
        });
    }
    </script>
</body>
</html>
