<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Bus Tracker</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #22c55e;
            --secondary: #16a34a;
            --dark: #0f172a;
            --card: rgba(255, 255, 255, .05);
            --text: #f8fafc;
            --muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--dark));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 380px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-4px);
        }

        .brand-header {
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .brand-header i {
            color: var(--primary);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            display: flex;
            align-items: center;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            padding-left: 12px;
            transition: all 0.2s ease;
        }

        .input-group-custom:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .input-group-custom i {
            color: var(--primary);
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff !important;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #94a3b8 !important;
            opacity: 0.6;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.2);
            transition: filter 0.2s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid transparent;
            text-align: left;
        }

        .alert-error { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-color: rgba(239, 68, 68, 0.25); 
        }
        
        .alert-success { 
            background-color: rgba(34, 197, 94, 0.15); 
            color: #86efac; 
            border-color: rgba(34, 197, 94, 0.25); 
        }

        hr {
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .footer-links {
            font-size: 0.9rem;
            color: var(--muted);
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        a:hover {
            color: #4ade80;
            text-decoration: underline;
        }

        .forgot-password {
            margin-top: 12px;
        }

        /* Spinner & Loader Overhaul */
        .loader-spinner {
            width: 55px;
            height: 55px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #threeBus canvas {
            max-width: 100%;
            height: auto !important;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2 class="brand-header">
            <i class="bi bi-bus-front-fill"></i> Sign In
        </h2>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="bi bi-exclamation-circle-fill me-2"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="bi bi-check-circle-fill me-2"></i> Logged out successfully.
        </div>

        <form id="loginForm" th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <div class="input-group-custom">
                <i class="bi bi-person-fill"></i>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
            </div>
            
            <label for="password">Password</label>
            <div class="input-group-custom">
                <i class="bi bi-lock-fill"></i>
                <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            </div>
            
            <button type="submit">Sign In</button>
        </form>

        <hr>
        
        <p class="footer-links">
            New here? <a th:href="@{/signup}">Create an Account</a>
        </p>
        <div class="forgot-password">
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>
    </div>

    <div id="loader" style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.95);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
    ">
        <div class="loader-spinner"></div>
        <div id="threeBus"></div>
        <h4 style="color: white; font-family: sans-serif; margin-top: 15px; font-weight: 600; letter-spacing: 0.5px;">Starting Bus Tracker...</h4>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

        renderer.setSize(180, 180);
        document.getElementById("threeBus").appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 3));
        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(5, 5, 5);
        scene.add(light);

        let bus; 
        const loader = new GLTFLoader();

        loader.load(
            '/models/bus.glb',
            function(gltf) {
                console.log("Bus Loaded");
                bus = gltf.scene;
                scene.add(bus);
            },
            undefined,
            function(error) {
                console.error("GLB Error", error);
            }
        );

        camera.position.z = 8;

        function animate() {
            requestAnimationFrame(animate);
            if(bus) {
                bus.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.showLoader = function() {
            document.getElementById("loader").style.display = "flex";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function() {
            if (typeof window.showLoader === "function") {
                window.showLoader();
            } else {
                document.getElementById("loader").style.display = "flex";
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(err => console.error('Service Worker Error:', err));
            });
        }
    </script>
</body>
</html>
