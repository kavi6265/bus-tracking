<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #22c55e;
            --secondary: #16a34a;
            --dark: #0f172a;
            --card: rgba(255, 255, 255, .05);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--dark));
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-4px);
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h2 i {
            color: var(--primary);
        }

        p.description {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            display: flex;
            align-items: center;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            padding-left: 14px;
            transition: all 0.2s ease;
        }

        .input-group-custom:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .input-group-custom i {
            color: var(--primary);
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff !important;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #94a3b8 !important;
            opacity: 0.6;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.2);
            transition: filter 0.2s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid transparent;
            text-align: left;
        }

        .success { 
            background-color: rgba(34, 197, 94, 0.15); 
            color: #86efac; 
            border-color: rgba(34, 197, 94, 0.25); 
        }

        .error { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-color: rgba(239, 68, 68, 0.25); 
        }

        hr {
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 25px 0 20px 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: #4ade80;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="form-card">

    <h2><i class="bi bi-shield-lock-fill"></i> Recover Access</h2>

    <p class="description">
        Enter your registered credentials below to dispatch an authentication link to your inbox.
    </p>

    <div th:if="${message}" class="alert success">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" class="alert error">
        <i class="bi bi-exclamation-circle-fill me-2"></i> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">

        <label for="email">Registered Email</label>
        <div class="input-group-custom">
            <i class="bi bi-envelope-fill"></i>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Enter your registered email"
                   required 
                   autofocus>
        </div>

        <button type="submit">
            <i class="bi bi-send-fill me-1"></i> Send Reset Link
        </button>

    </form>

    <hr>

    <a th:href="@{/login}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Login
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.error('Service Worker Error:', err));
    });
}
</script>
</body>
</html>
