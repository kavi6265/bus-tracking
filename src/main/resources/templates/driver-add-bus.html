<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bus Details - Smart Bus Tracker</title>
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #22c55e;
            --secondary: #16a34a;
            --dark: #0f172a;
            --card: rgba(255, 255, 255, .05);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--dark));
            color: var(--text);
            min-height: 100vh;
            padding: 20px 12px 40px 12px;
        }

        .container-custom {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 2rem 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 550px;
            margin: 20px auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-bottom: 25px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--primary);
            border-color: var(--primary);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 6px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-custom {
            display: flex;
            align-items: flex-start;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            padding-left: 14px;
            transition: all 0.2s ease;
        }

        .input-group-custom:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .input-group-custom i {
            color: var(--primary);
            font-size: 1.1rem;
            margin-top: 12px;
        }

        input, select, textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff !important;
            padding: 12px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
            padding-right: 35px;
        }

        select option {
            background-color: #1f2937;
            color: #ffffff;
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8 !important;
            opacity: 0.5;
        }

        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.2);
            transition: filter 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover {
            filter: brightness(1.1);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid transparent;
            text-align: left;
        }

        .success { 
            background-color: rgba(34, 197, 94, 0.15); 
            color: #86efac; 
            border-color: rgba(34, 197, 94, 0.25); 
        }

        .error { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: #fca5a5; 
            border-color: rgba(239, 68, 68, 0.25); 
        }
    </style>
</head>
<body>

<div class="container-custom">

    <a th:href="@{/dashboard}" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>

    <h2><i class="bi bi-bus-front-fill text-success"></i> Add Bus Details</h2>

    <div th:if="${message}" class="alert success">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" class="alert error">
        <i class="bi bi-exclamation-circle-fill me-2"></i> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/driver/add-bus}" method="post">

        <label for="busNumber">Bus Number</label>
        <div class="input-group-custom">
            <i class="bi bi-hash"></i>
            <input type="text" id="busNumber" name="busNumber" placeholder="e.g. TN-33-AA-1234" required>
        </div>

        <label for="busName">Bus Name / Fleet Name</label>
        <div class="input-group-custom">
            <i class="bi bi-bookmark-dash-fill"></i>
            <input type="text" id="busName" name="busName" placeholder="e.g. Route Hub Fleet" required>
        </div>

        <label for="busType">Bus Classification</label>
        <div class="input-group-custom">
            <i class="bi bi-sliders"></i>
            <select id="busType" name="busType" required>
                <option value="">Select Bus Type</option>
                <option value="Government">Government</option>
                <option value="Private">Private</option>
                <option value="Ordinary">Ordinary</option>
                <option value="Express">Express</option>
                <option value="Super Fast">Super Fast</option>
                <option value="Deluxe">Deluxe</option>
                <option value="AC">AC</option>
                <option value="Sleeper">Sleeper</option>
            </select>
        </div>

        <label for="source">Source Terminal</label>
        <div class="input-group-custom">
            <i class="bi bi-geo-alt-fill"></i>
            <input type="text" id="source" name="source" placeholder="Origin Station Hub" required>
        </div>

        <label for="destination">Destination Terminal</label>
        <div class="input-group-custom">
            <i class="bi bi-flag-fill"></i>
            <input type="text" id="destination" name="destination" placeholder="Final Destination Hub" required>
        </div>

        <label for="stops">Intermediate Corridor Stops Sequence</label>
        <div class="input-group-custom">
            <i class="bi bi-signpost-split-fill"></i>
            <textarea id="stops" name="stops" rows="4" 
                      placeholder="Enter stops comma-separated.&#10;Example: Guindy, Pallavaram, Chromepet, Tambaram" 
                      required></textarea>
        </div>

        <button type="submit">
            <i class="bi bi-cloud-arrow-up-fill me-1"></i> Save Bus Details
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.error('Service Worker Error:', err));
    });
}
</script>
</body>
</html>
